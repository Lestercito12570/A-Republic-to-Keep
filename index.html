<!doctype html> 
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A Republic to Keep</title>
  <meta name="description" content="A Republic to Keep — Liberty-inspired American goods." />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8T1CG3FN3G"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8T1CG3FN3G');
  </script>

  <style>
    :root {
      --ink: #161616;
      --paper: #f4efe4;
      --line: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      position: relative;
      background-color: var(--paper);
      background-image: url("spirit76.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(244, 239, 228, 0.84);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .broadside {
      width: min(760px, 100%);
      background: rgba(255, 255, 255, 0.28);
      border: 2px solid rgba(22, 22, 22, 0.88);
      padding: 42px 28px 34px;
      text-align: center;
      position: relative;
    }

    .broadside::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(22, 22, 22, 0.35);
      pointer-events: none;
    }

    .printer-mark {
      max-width: 260px;
      width: 100%;
      margin: 0 auto 26px;
      display: block;
    }

    .kicker {
      margin: 0 0 18px;
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .logo {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1.05;
    }

    .logo .small {
      display: block;
      font-size: 0.66em;
      margin-top: 6px;
    }

    .rule {
      width: 60%;
      height: 1px;
      background: var(--line);
      margin: 20px auto;
    }

    .city {
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .year {
      margin-top: 10px;
      letter-spacing: 0.22em;
    }

    .copy {
      max-width: 560px;
      margin: 30px auto;
      line-height: 1.7;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: white;
    }

    footer {
      margin-top: 28px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="broadside">
      <img class="printer-mark" src="Logo1.ARTK.png" alt="A Republic to Keep" />

      <p class="kicker">Liberty-Inspired Goods</p>

      <h1 class="logo">
        A Republic
        <span class="small">to Keep</span>
      </h1>

      <div class="rule"></div>

      <p class="city">Philadelphia</p>
      <p class="year">• 1787 •</p>

      <p class="copy">
        Thoughtful products inspired by founding principles, civic ideals,
        and the enduring spirit of Philadelphia. Visit the shop to browse the collection.
      </p>

      <a class="button" href="https://www.etsy.com/shop/ARepublictoKeep" target="_blank" rel="noopener noreferrer">
        Visit the Collection
      </a>

      <footer>
        © 2026 Garden Shed Clay LLC. All rights reserved.
      </footer>
    </section>
  </main>
</body>
</html>
